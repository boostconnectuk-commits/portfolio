<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayyoub E. — CRM Systems &amp; Automation Lead</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --gold:    #fec850;
  --black:   #0a0a0a;
  --bg:      #fafafa;
  --text:    #111111;
  --muted:   #737373;
  --border:  #e2e2e2;
  --ease:    cubic-bezier(0.16, 1, 0.3, 1);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ── NAV ── */
#nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  height: 60px;
  transition: background 0.25s var(--ease), box-shadow 0.25s var(--ease);
}
#nav.scrolled {
  background: var(--bg);
  box-shadow: 0 1px 0 var(--border);
}
.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  height: 100%;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
@media (min-width: 768px) { .nav-inner { padding: 0 48px; } }

.nav-logo {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.02em;
  color: #fff;
  text-decoration: none;
  cursor: pointer;
  transition: color 0.25s;
}
#nav.scrolled .nav-logo { color: var(--black); }

.nav-links {
  display: none;
  list-style: none;
  gap: 36px;
  align-items: center;
}
@media (min-width: 640px) { .nav-links { display: flex; } }

.nav-links a {
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.65);
  text-decoration: none;
  cursor: pointer;
  transition: color 0.2s;
}
#nav.scrolled .nav-links a { color: var(--muted); }
.nav-links a:hover,
#nav.scrolled .nav-links a:hover { color: var(--gold); }
.nav-links a:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; border-radius: 2px; }

.nav-burger {
  display: flex;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
}
@media (min-width: 640px) { .nav-burger { display: none; } }
.nav-burger span {
  display: block;
  width: 22px;
  height: 1.5px;
  background: #fff;
  transition: background 0.25s;
}
#nav.scrolled .nav-burger span { background: var(--black); }

/* ── MOBILE MENU ── */
#mobile-nav {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 199;
  background: var(--black);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 40px;
}
#mobile-nav.open { display: flex; }
.mobile-nav-close {
  position: absolute;
  top: 16px; right: 24px;
  background: none;
  border: none;
  color: rgba(255,255,255,0.6);
  font-size: 28px;
  cursor: pointer;
  line-height: 1;
  transition: color 0.2s;
}
.mobile-nav-close:hover { color: #fff; }
#mobile-nav a {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 28px;
  font-weight: 600;
  color: #fff;
  text-decoration: none;
  cursor: pointer;
  transition: color 0.2s;
}
#mobile-nav a:hover { color: var(--gold); }

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; }

/* ── HERO ── */
.hero {
  background: var(--black);
  min-height: 100vh;
  display: flex;
  align-items: flex-end;
  padding: 120px 24px 80px;
  position: relative;
  overflow: hidden;
}
.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 55% 55% at 85% 15%, rgba(254,200,80,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 35% 45% at 10% 90%, rgba(254,200,80,0.04) 0%, transparent 55%);
  pointer-events: none;
}
@media (min-width: 768px) { .hero { padding: 120px 48px 88px; } }
@media (min-width: 1024px) { .hero { padding: 140px 80px 100px; } }

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  position: relative;
  z-index: 1;
}
.hero-eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  display: block;
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeUp 0.5s var(--ease) 0.1s forwards;
}
.hero-name {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: clamp(52px, 9vw, 100px);
  color: #fff;
  letter-spacing: -0.035em;
  line-height: 0.92;
  margin-bottom: 28px;
  opacity: 0;
  animation: fadeUp 0.55s var(--ease) 0.22s forwards;
}
.hero-rule {
  width: 36px;
  height: 2px;
  background: var(--gold);
  margin-bottom: 24px;
  opacity: 0;
  animation: fadeUp 0.5s var(--ease) 0.35s forwards;
}
.hero-oneliner {
  font-size: clamp(15px, 1.8vw, 19px);
  line-height: 1.7;
  color: rgba(255,255,255,0.65);
  max-width: 580px;
  margin-bottom: 10px;
  opacity: 0;
  animation: fadeUp 0.5s var(--ease) 0.44s forwards;
}
.hero-subline {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: rgba(255,255,255,0.35);
  margin-bottom: 44px;
  opacity: 0;
  animation: fadeUp 0.5s var(--ease) 0.52s forwards;
}
.btn-cta {
  display: inline-block;
  background: var(--gold);
  color: var(--black);
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.04em;
  padding: 13px 26px;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: opacity 0.18s, transform 0.18s var(--ease);
  opacity: 0;
  animation: fadeUp 0.5s var(--ease) 0.62s forwards;
}
.btn-cta:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-cta:active { transform: none; }
.btn-cta:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }

/* ── SECTION SHARED ── */
.section-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  display: block;
  margin-bottom: 48px;
}

/* ── HOW I WORK ── */
.how-i-work {
  padding: 96px 24px;
}
@media (min-width: 768px) { .how-i-work { padding: 112px 48px; } }

.how-i-work .section-inner { max-width: 1200px; margin: 0 auto; }

.steps-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
}
@media (min-width: 600px) { .steps-grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 1024px) { .steps-grid { grid-template-columns: repeat(4, 1fr); } }

.step {
  padding: 28px 0;
  border-top: 1px solid var(--border);
}
@media (min-width: 600px) {
  .step { padding: 28px 28px 28px 0; }
  .step:nth-child(even) { padding-left: 28px; border-left: 1px solid var(--border); }
}
@media (min-width: 1024px) {
  .step { padding: 28px 32px 28px 0; border-left: none; }
  .step + .step { border-left: 1px solid var(--border); padding-left: 32px; }
}
.step-idx {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--gold);
  display: block;
  margin-bottom: 14px;
}
.step-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 19px;
  letter-spacing: -0.02em;
  margin-bottom: 10px;
  color: var(--text);
}
.step-desc {
  font-size: 14px;
  line-height: 1.72;
  color: var(--muted);
}

/* ── CATEGORIES GRID ── */
.categories-section {
  padding: 0 24px 96px;
}
@media (min-width: 768px) { .categories-section { padding: 0 48px 112px; } }

.categories-section .section-inner { max-width: 1200px; margin: 0 auto; }

.cat-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}
@media (min-width: 600px) { .cat-grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 1024px) { .cat-grid { grid-template-columns: repeat(3, 1fr); } }

.cat-card {
  background: #fff;
  padding: 32px 28px 28px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  display: block;
  text-decoration: none;
  transition: background 0.2s var(--ease);
  border: none;
  text-align: left;
}
.cat-card:focus-visible { outline: 2px solid var(--gold); outline-offset: -2px; }
.cat-card:hover { background: var(--black); }

.cat-ghost {
  position: absolute;
  right: 12px;
  bottom: -16px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 108px;
  line-height: 1;
  color: rgba(0,0,0,0.04);
  user-select: none;
  pointer-events: none;
  transition: color 0.2s;
}
.cat-card:hover .cat-ghost { color: rgba(255,255,255,0.04); }

.cat-card-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 17px;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 8px;
  transition: color 0.2s;
  position: relative;
  z-index: 1;
}
.cat-card:hover .cat-card-title { color: #fff; }

.cat-card-desc {
  font-size: 13px;
  line-height: 1.65;
  color: var(--muted);
  margin-bottom: 28px;
  transition: color 0.2s;
  position: relative;
  z-index: 1;
}
.cat-card:hover .cat-card-desc { color: rgba(255,255,255,0.5); }

.cat-card-count {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: rgba(0,0,0,0.3);
  transition: color 0.2s;
  position: relative;
  z-index: 1;
}
.cat-card:hover .cat-card-count { color: var(--gold); }

/* ── DARK HEADER (shared by category + project views) ── */
.dark-header {
  background: var(--black);
  padding: 88px 24px 60px;
}
@media (min-width: 768px) { .dark-header { padding: 100px 48px 68px; } }

.dark-header-inner { max-width: 1200px; margin: 0 auto; }

.back-link {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  margin-bottom: 28px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: color 0.2s;
  text-decoration: none;
}
.back-link:hover { color: var(--gold); }
.back-link:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; border-radius: 2px; }

.dark-header h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: clamp(28px, 5vw, 52px);
  color: #fff;
  letter-spacing: -0.03em;
  line-height: 1.05;
  margin-bottom: 12px;
}
.dark-header p {
  font-size: 15px;
  color: rgba(255,255,255,0.5);
  max-width: 520px;
  line-height: 1.65;
}

/* ── CATEGORY VIEW ── */
#view-category { padding-top: 60px; }

.proj-list {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 16px 80px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  align-items: start;
}
@media (min-width: 480px) { .proj-list { padding: 36px 24px 88px; gap: 16px; } }
@media (min-width: 768px) { .proj-list { padding: 44px 48px 96px; gap: 20px; } }

.proj-row {
  cursor: pointer;
  display: flex;
  flex-direction: column;
  width: 100%;
  text-align: left;
  background: #fff;
  border: 1px solid var(--border);
  overflow: hidden;
  transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease), transform 0.2s var(--ease);
  padding: 0;
}
.proj-row:hover {
  border-color: var(--black);
  box-shadow: 0 6px 24px rgba(0,0,0,0.09);
  transform: translateY(-2px);
}
.proj-row:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

/* Icon preview header */
.proj-card-icon {
  height: 110px;
  background: var(--black);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
@media (min-width: 480px) { .proj-card-icon { height: 130px; } }
@media (min-width: 768px) { .proj-card-icon { height: 160px; } }

.proj-card-icon::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.028) 1px, transparent 1px);
  background-size: 22px 22px;
  pointer-events: none;
}
.proj-card-icon svg {
  width: 36px;
  height: 36px;
  position: relative;
  z-index: 1;
  transition: transform 0.25s var(--ease);
}
@media (min-width: 768px) { .proj-card-icon svg { width: 44px; height: 44px; } }
.proj-row:hover .proj-card-icon svg { transform: scale(1.1); }

.proj-card-icon-accent {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--gold);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s var(--ease);
  z-index: 2;
}
.proj-row:hover .proj-card-icon-accent { transform: scaleX(1); }

/* Card body */
.proj-card-body {
  padding: 14px 14px 16px;
  display: flex;
  flex-direction: column;
  flex: 1;
}
@media (min-width: 480px) { .proj-card-body { padding: 16px 18px 18px; } }
@media (min-width: 768px) { .proj-card-body { padding: 20px 22px 22px; } }

.proj-row-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: -0.01em;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 6px;
  transition: color 0.18s;
}
@media (min-width: 480px) { .proj-row-title { font-size: 14px; } }
@media (min-width: 768px) { .proj-row-title { font-size: 16px; margin-bottom: 8px; } }

.proj-row-context {
  font-size: 11px;
  line-height: 1.65;
  color: var(--muted);
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
@media (min-width: 480px) { .proj-row-context { font-size: 12px; } }
@media (min-width: 768px) { .proj-row-context { font-size: 13px; } }

.proj-row-arrow {
  font-size: 13px;
  color: #ccc;
  align-self: flex-end;
  margin-top: 12px;
  transition: transform 0.18s var(--ease), color 0.18s;
}
.proj-row:hover .proj-row-arrow { transform: translateX(3px); color: var(--black); }

/* ── PROJECT DETAIL VIEW ── */
#view-project { padding-top: 60px; }

.proj-tag {
  display: inline-block;
  background: var(--gold);
  color: var(--black);
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 4px 9px;
  margin-bottom: 20px;
}

.proj-body {
  max-width: 760px;
  margin: 0 auto;
  padding: 56px 24px 96px;
}
@media (min-width: 768px) { .proj-body { padding: 64px 48px 96px; } }

.proj-section { margin-bottom: 44px; }

.proj-sec-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  display: block;
  margin-bottom: 14px;
}

.proj-context {
  font-size: 17px;
  line-height: 1.72;
  color: var(--text);
}
.proj-challenge,
.proj-outcome {
  font-size: 15px;
  line-height: 1.78;
  color: var(--muted);
}
.proj-outcome { color: var(--text); }

.proj-built {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 11px;
}
.proj-built li {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  padding-left: 18px;
  position: relative;
}
.proj-built li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 11px;
  width: 7px;
  height: 1px;
  background: var(--gold);
}

/* ── PREVIEW IMAGES ── */
.preview-grid {
  display: grid;
  gap: 12px;
  margin-top: 4px;
}
.preview-grid.two { grid-template-columns: 1fr 1fr; }

.preview-slot {
  border: 1.5px dashed var(--border);
  background: #f5f5f5;
  min-height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.preview-slot span {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #c8c8c8;
}
.preview-slot img,
.preview-real {
  width: 100%;
  height: auto;
  display: block;
}

/* ── BEFORE / AFTER ── */
.ba-wrap {
  background: var(--black);
  margin-top: 4px;
}
.ba-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
}
.ba-panel {
  padding: 36px 28px;
}
.ba-panel.ba-before { border-right: 1px solid rgba(255,255,255,0.07); }
.ba-panel.ba-after  { position: relative; }
.ba-panel.ba-after::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--gold);
}
.ba-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  display: block;
  margin-bottom: 22px;
}
.ba-stat { margin-bottom: 14px; }
.ba-num {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: clamp(28px, 4vw, 40px);
  letter-spacing: -0.03em;
  line-height: 1;
  display: block;
  margin-bottom: 3px;
}
.ba-before .ba-num { color: rgba(255,255,255,0.28); }
.ba-after  .ba-num { color: var(--gold); }
.ba-stat-label {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
}
.ba-img-slot {
  margin-top: 20px;
  border: 1px dashed rgba(255,255,255,0.12);
  min-height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ba-img-slot span {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.18);
  text-transform: uppercase;
}
.ba-img-slot img { width: 100%; display: block; }

/* ── DEVICE FRAMES (landing pages) ── */
.device-pair {
  display: grid;
  grid-template-columns: 1fr 140px;
  gap: 16px;
  align-items: flex-end;
}
@media (min-width: 640px) { .device-pair { grid-template-columns: 1fr 170px; gap: 24px; } }

/* macOS browser window */
.device-mac {
  background: #1c1c1e;
  border-radius: 10px 10px 0 0;
  overflow: hidden;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 12px 32px rgba(0,0,0,0.22);
}
.device-mac-bar {
  background: #2c2c2e;
  height: 28px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 6px;
}
.device-mac-dot { width: 10px; height: 10px; border-radius: 50%; }
.device-mac-dot:nth-child(1) { background: #ff5f57; }
.device-mac-dot:nth-child(2) { background: #febc2e; }
.device-mac-dot:nth-child(3) { background: #28c840; }
.device-mac-screen {
  aspect-ratio: 16/10;
  background: #f0f0f0;
  overflow: hidden;
  position: relative;
}
.device-mac-screen img    { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
.device-mac-screen .slot  { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

/* iPhone frame */
.device-iphone-wrap {
  flex-shrink: 0;
}
.device-iphone-shell {
  background: #1c1c1e;
  border-radius: 36px;
  padding: 10px 7px;
  position: relative;
  box-shadow: 0 0 0 1.5px #3a3a3c, 0 8px 28px rgba(0,0,0,0.28);
}
.device-iphone-notch {
  position: absolute;
  top: 10px; left: 50%;
  transform: translateX(-50%);
  width: 64px; height: 20px;

/* ================================================================
 * UTILS
 * ================================================================ */
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escAttr(s) { return esc(s); }

function findProject(id) {
  for (var i = 0; i < PORTFOLIO_DATA.categories.length; i++) {
    var cat = PORTFOLIO_DATA.categories[i];
    for (var j = 0; j < cat.projects.length; j++) {
      if (cat.projects[j].id === id) return { project: cat.projects[j], cat: cat };
    }
  }
  return null;
}

function findCategory(id) {
  for (var i = 0; i < PORTFOLIO_DATA.categories.length; i++) {
    if (PORTFOLIO_DATA.categories[i].id === id) return PORTFOLIO_DATA.categories[i];
  }
  return null;
}


/* ================================================================
 * ROUTING
 * ================================================================ */
function getHash() {
  return (window.location.hash || '').replace(/^#/, '') || 'home';
}

function navigate(hash) {
  window.history.pushState(null, '', '#' + hash);
  route(hash);
  window.scrollTo({ top: 0 });
}

window.addEventListener('popstate', function () {
  route(getHash());
  window.scrollTo({ top: 0 });
});

function route(hash) {
  if (!hash || hash === 'home') { showView('view-home'); return; }
  var parts = hash.split('/');
  if (parts[0] === 'category' && parts[1]) { renderCategory(parts[1]); return; }
  if (parts[0] === 'project'  && parts[1]) { renderProject(parts[1]);  return; }
  showView('view-home');
}

function showView(id) {
  document.querySelectorAll('.view').forEach(function (v) { v.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function renderCategory(catId) {
  var cat = findCategory(catId);
  if (!cat) { navigate('home'); return; }

  document.getElementById('cat-title').textContent = cat.title;
  document.getElementById('cat-desc').textContent  = cat.description;
  document.getElementById('cat-back').onclick = function () { navigate('home'); };

  var icon = CAT_ICONS[cat.id] || CAT_ICONS['consultancy'];

  document.getElementById('proj-list').innerHTML = cat.projects.map(function (p) {
    return '<button class="proj-row" data-nav="project/' + esc(p.id) + '" aria-label="View ' + esc(p.title) + '">' +
      '<div class="proj-card-icon">' +
        icon +
        '<div class="proj-card-icon-accent"></div>' +
      '</div>' +
      '<div class="proj-card-body">' +
        '<div class="proj-row-title">' + esc(p.title) + '</div>' +
        '<div class="proj-row-context">' + esc(p.context) + '</div>' +
        '<span class="proj-row-arrow" aria-hidden="true">&#8594;</span>' +
      '</div>' +
      '</button>';
  }).join('');

  showView('view-category');
}


/* ================================================================
 * RENDER: PROJECT
 * ================================================================ */
function renderProject(projectId) {
  var found = findProject(projectId);
  if (!found) { navigate('home'); return; }
  var p   = found.project;
  var cat = found.cat;

  document.getElementById('proj-tag').textContent   = cat.title;
  document.getElementById('proj-title').textContent = p.title;
  document.getElementById('proj-back').onclick = function () { navigate('category/' + cat.id); };

  var html = '';

  /* Context */
  if (p.context) {
    html += section('Context', '<p class="proj-context">' + esc(p.context) + '</p>');
  }

  /* Challenge */
  if (p.challenge) {
    html += section('The Challenge', '<p class="proj-challenge">' + esc(p.challenge) + '</p>');
  }

  /* What I Built */
  if (p.whatIBuilt && p.whatIBuilt.length) {
    html += section('What I Built',
      '<ul class="proj-built">' +
        p.whatIBuilt.map(function (item) { return '<li>' + esc(item) + '</li>'; }).join('') +
      '</ul>'
    );
  }

  /* Preview — device frames (landing pages) */
  if (p.previewStyle === 'device' && p.images && p.images.length >= 2) {
    html += section('Preview', renderDeviceFrame(p.images[0], p.images[1]));
  }
  /* Preview — standard (all other projects) */
  else if (p.images && p.images.length > 0) {
    var cols  = p.images.length >= 2 ? 'two' : '';
    var slots = p.images.map(function (src) {
      if (src && src.trim()) {
        return '<div><img src="' + escAttr(src) + '" alt="Project preview" class="preview-real" loading="lazy"></div>';
      }
      return '<div class="preview-slot"><span>Preview</span></div>';
    }).join('');
    html += section('Preview', '<div class="preview-grid ' + cols + '">' + slots + '</div>');
  }

  /* Email performance timeline */
  if (p.timelineImages && p.timelineImages.length) {
    html += section('Performance — Last 9 Months', renderTimeline(p.timelineImages));
  }

  /* Outcome */
  if (p.outcome) {
    html += section('Outcome', '<p class="proj-outcome">' + esc(p.outcome) + '</p>');
  }

  document.getElementById('proj-body').innerHTML = html;
  showView('view-project');
}

function section(label, content) {
  return '<div class="proj-section">' +
    '<span class="proj-sec-label">' + esc(label) + '</span>' +
    content +

}

function panel(cls, labelText, data) {
  var imgHtml = data.imgSrc
    ? '<div class="ba-img-slot"><img src="' + escAttr(data.imgSrc) + '" alt="' + esc(labelText) + ' analytics"></div>'
    : '<div class="ba-img-slot"><span>Analytics screenshot</span></div>';
  return '<div class="ba-panel ' + cls + '">' +
    '<span class="ba-label">' + esc(labelText) + '</span>' +
    '<div class="ba-stat"><span class="ba-num">' + esc(data.openRate) + '</span><span class="ba-stat-label">Open rate</span></div>' +
    '<div class="ba-stat"><span class="ba-num">' + esc(data.ctr)      + '</span><span class="ba-stat-label">Click-through rate</span></div>' +
    imgHtml +
    '</div>';
}


function renderDeviceFrame(desktopSrc, mobileSrc) {
  var macScreen = desktopSrc && desktopSrc.trim()
    ? '<img src="' + escAttr(desktopSrc) + '" alt="Desktop preview" loading="lazy">'
    : '<div class="slot"><span class="device-slot-label">Desktop screenshot</span></div>';

  var phoneScreen = mobileSrc && mobileSrc.trim()
    ? '<img src="' + escAttr(mobileSrc) + '" alt="Mobile preview" loading="lazy">'
    : '<div class="slot"><span class="device-slot-label">Mobile screenshot</span></div>';

  return '<div class="device-pair">' +
    '<div class="device-mac">' +
      '<div class="device-mac-bar">' +
        '<div class="device-mac-dot"></div>' +
        '<div class="device-mac-dot"></div>' +
        '<div class="device-mac-dot"></div>' +
      '</div>' +
      '<div class="device-mac-screen">' + macScreen + '</div>' +
    '</div>' +
    '<div class="device-iphone-wrap">' +
      '<div class="device-iphone-shell">' +
        '<div class="device-iphone-notch"></div>' +
        '<div class="device-iphone-screen">' + phoneScreen + '</div>' +
        '<div class="device-iphone-bar"></div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderTimeline(items) {
  var parts = [];
  items.forEach(function (item, i) {
    var imgHtml = item.imgSrc && item.imgSrc.trim()
      ? '<img src="' + escAttr(item.imgSrc) + '" alt="' + esc(item.period) + '" loading="lazy">'
      : '<span class="slot-lbl">Screenshot</span>';

    parts.push(
      '<div class="tl-item">' +
        '<div class="tl-img-slot">' + imgHtml + '</div>' +
        '<div class="tl-meta">' +
          '<span class="tl-period">' + esc(item.period) + '</span>' +
          '<span class="tl-sublabel">' + esc(item.sublabel) + '</span>' +
        '</div>' +
      '</div>'
    );

    if (i < items.length - 1) {
      parts.push('<div class="tl-arrow" aria-hidden="true">&#8594;</div>');
    }
  });
  return '<div class="email-timeline">' + parts.join('') + '</div>';
}


/* ================================================================
 * SCROLL REVEAL
 * ================================================================ */
function initReveal() {
  if (!('IntersectionObserver' in window)) {
    document.querySelectorAll('.reveal').forEach(function (el) { el.classList.add('visible'); });
    return;
  }
  var obs = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(function (el) { obs.observe(el); });
}

/* ── NAV scroll behaviour ── */
window.addEventListener('scroll', function () {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 10);
}, { passive: true });


/* ================================================================
 * EVENT DELEGATION
 * ================================================================ */
document.addEventListener('click', function (e) {
  /* data-nav buttons/links */
  var navTarget = e.target.closest('[data-nav]');
  if (navTarget) { navigate(navTarget.getAttribute('data-nav')); return; }

  /* data-scroll links */
  var scrollTarget = e.target.closest('[data-scroll]');
  if (scrollTarget) {
    var sectionId = scrollTarget.getAttribute('data-scroll');
    var hash = getHash();
    if (hash !== 'home' && hash !== '') {
      navigate('home');
      setTimeout(function () { scrollToId(sectionId); }, 350);
    } else {
      scrollToId(sectionId);
    }
    /* close mobile menu if open */
    document.getElementById('mobile-nav').classList.remove('open');
    document.body.style.overflow = '';
    return;
  }

  /* logo */
  if (e.target.classList.contains('nav-logo') || e.target.closest('.nav-logo')) {
    navigate('home');
    return;
  }

  /* mobile close */
  if (e.target.id === 'mobile-close') {
    document.getElementById('mobile-nav').classList.remove('open');
    document.body.style.overflow = '';
    return;
  }
});

function scrollToId(id) {
  var el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* burger */
document.getElementById('burger-btn').addEventListener('click', function () {
  document.getElementById('mobile-nav').classList.add('open');
  document.body.style.overflow = 'hidden';
});


/* ================================================================
 * INIT
 * ================================================================ */
renderHome();
route(getHash());
</script>
